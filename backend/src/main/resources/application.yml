spring:
  application:
    name: backend
  datasource:
    # URL for Supabase local Postgres instance
    url: jdbc:postgresql://127.0.0.1:54322/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Since we manage schema via Supabase migrations, we disable hibernate auto ddl
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081

logging:
  level:
    org:
      springframework:
        web: INFO
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
